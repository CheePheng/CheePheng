name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  isometric-calendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: CheePheng
          filename: github-metrics-isometric.svg
          template: classic
          base: ""
          config_timezone: Asia/Singapore
          config_display: large
          config_output: svg
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

